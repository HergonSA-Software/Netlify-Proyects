[build]
  command   = "npm install && node scripts/generate-env.js"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Rate limit: chatbot público — 10 mensajes/min por IP
# Debe ir ANTES del wildcard /api/* para que tenga precedencia
[[redirects]]
  from   = "/api/chat-tool"
  to     = "/.netlify/functions/chat-tool"
  status = 200
  force  = true
  [redirects.rate_limit]
    window_limit = 10
    window_size  = 60
    aggregate_by = ["ip", "domain"]

# Redirect /api/* to Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Admin route — serve SPA
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# Catch-all: serve index
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
