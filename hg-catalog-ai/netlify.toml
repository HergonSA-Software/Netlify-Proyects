[build]
  command   = "npm install"
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect /api/* to Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Admin route — serve SPA
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# Catch-all: serve index
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
